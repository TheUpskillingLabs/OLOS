# CI — lint, unit tests, build (roadmap Phase 0: the repo previously had
# no test runner and no CI at all). Build needs no secrets: pages that read
# Supabase are force-dynamic, so nothing queries at build time.
name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
